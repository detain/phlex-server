name: PHPUnit Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: PHPUnit Test Suite
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: phlix_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysql, pdo, pdo_mysql, json, gd, zip, fileinfo
          coverage: xdebug

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit --testsuite Unit --coverage-clover coverage.xml --coverage-html coverage-report

      - name: Check minimum coverage threshold
        run: |
          # Re-enabled coverage check from 01fa91b
          LINE_COVERAGE=$(xmllint --xpath "string(/coverage/project/metrics/@line-rate)" coverage.xml 2>/dev/null || echo "0")
          LINE_COVERAGE=$(echo "$LINE_COVERAGE * 100" | bc | cut -d. -f1)
          MIN_COVERAGE=80

          echo "Line coverage: $LINE_COVERAGE%"
          echo "Minimum required: $MIN_COVERAGE%"

          if (( $(echo "$LINE_COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "ERROR: Coverage $LINE_COVERAGE% is below minimum $MIN_COVERAGE%"
            exit 1
          fi

          echo "Coverage check passed!"

      - name: Upload coverage to Codecov
        if: secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-server:
    name: Server Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, pcntl, posix
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Server-specific tests
        run: ./vendor/bin/phpunit tests/Unit/Server/

      - name: Check code style
        run: |
          if [ -f vendor/bin/phpcs ]; then
            ./vendor/bin/phpcs --standard=PSR12 src/Server/
          fi
