name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/detain/phlix-server

jobs:
  verify-chart-version:
    name: Verify Helm Chart appVersion matches tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Assert Chart.yaml appVersion matches tag
        run: |
          set -e
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          for chart in k8s/helm/phlix/Chart.yaml k8s/helm/phlix-hub/Chart.yaml; do
            APP_VERSION=$(awk '/^appVersion:/ {gsub(/"/,"",$2); print $2; exit}' "$chart")
            if [ -z "$APP_VERSION" ]; then
              echo "::error file=$chart::appVersion not found"
              exit 1
            fi
            if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
              echo "::error file=$chart::appVersion ($APP_VERSION) does not match release tag ($TAG_VERSION)"
              exit 1
            fi
            echo "OK: $chart appVersion=$APP_VERSION matches tag $TAG_VERSION"
          done

      - name: Assert composer.json version matches tag
        run: |
          set -e
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          COMPOSER_VERSION=$(python3 -c "import json; print(json.load(open('composer.json')).get('version',''))")
          if [ "$COMPOSER_VERSION" != "$TAG_VERSION" ]; then
            echo "::error file=composer.json::version ($COMPOSER_VERSION) does not match release tag ($TAG_VERSION)"
            exit 1
          fi
          echo "OK: composer.json version=$COMPOSER_VERSION matches tag $TAG_VERSION"

  package-charts:
    name: Package Helm charts
    runs-on: ubuntu-latest
    needs: verify-chart-version
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Lint charts
        run: |
          helm lint k8s/helm/phlix
          helm lint k8s/helm/phlix-hub

      - name: Package charts
        run: |
          mkdir -p dist/charts
          helm package k8s/helm/phlix -d dist/charts
          helm package k8s/helm/phlix-hub -d dist/charts
          ls -la dist/charts/

      - name: Upload chart artifacts
        uses: actions/upload-artifact@v7
        with:
          name: helm-charts
          path: dist/charts/*.tgz
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [verify-chart-version, package-charts]

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download chart artifacts
        uses: actions/download-artifact@v8
        with:
          name: helm-charts
          path: dist/charts

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:'%s' ${{ github.ref_name }}..HEAD 2>/dev/null | head -20 || echo "See CHANGELOG.md for details")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.ref_name }}...HEAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Phlix Server ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            coverage-report.tar.gz
            dist/charts/*.tgz
