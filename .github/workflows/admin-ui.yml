name: Admin UI

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'admin-ui/**'
      - '.github/workflows/admin-ui.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'admin-ui/**'
      - '.github/workflows/admin-ui.yml'

# Least-privilege: build + test need no write scope and consume no secrets,
# so this stays safe for fork PRs (e.g. the Vite dependabot PR #131).
permissions:
  contents: read

jobs:
  build-test:
    name: Admin UI Build + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # CI pins LTS 20 (local dev runs v24).
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev
        working-directory: admin-ui

      - name: Build SPA (tsc --noEmit && vite build)
        run: npm run build
        working-directory: admin-ui

      - name: Run Vitest suite (vitest run)
        run: npm run test
        working-directory: admin-ui
