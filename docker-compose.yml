version: '3.8'

services:
  phlix:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: phlix-server
    ports:
      - "8080:80"
    environment:
      - PHLIX_DATABASE_HOST=mysql
      - PHLIX_DATABASE_PORT=3306
      - PHLIX_DATABASE_NAME=phlix
      - PHLIX_DATABASE_USER=phlix
      - PHLIX_DATABASE_PASSWORD=phlix_secret
    volumes:
      - phlix_config:/var/phlix/config
      - phlix_data:/var/phlix/data
      - phlix_backups:/var/phlix/backups
      - media_library:/media
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: phlix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: phlix
      MYSQL_USER: phlix
      MYSQL_PASSWORD: phlix_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  phlix_config:
  phlix_data:
  phlix_backups:
  media_library:
  mysql_data:
