version: '3.8'

services:
  phlex:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: phlex-server
    ports:
      - "8080:80"
    environment:
      - PHLEX_DATABASE_HOST=mysql
      - PHLEX_DATABASE_PORT=3306
      - PHLEX_DATABASE_NAME=phlex
      - PHLEX_DATABASE_USER=phlex
      - PHLEX_DATABASE_PASSWORD=phlex_secret
    volumes:
      - phlex_config:/var/phlex/config
      - phlex_data:/var/phlex/data
      - phlex_backups:/var/phlex/backups
      - media_library:/media
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: phlex-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: phlex
      MYSQL_USER: phlex
      MYSQL_PASSWORD: phlex_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  phlex_config:
  phlex_data:
  phlex_backups:
  media_library:
  mysql_data:
