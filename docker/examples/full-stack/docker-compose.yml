version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "3473:3473"
    environment:
      - TZ=UTC
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/etc/traefik/certs
    networks:
      - phlix_network
    restart: unless-stopped

  phlix-hub:
    image: ghcr.io/detain/phlix-hub:latest
    container_name: phlix-hub
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phlix-hub.rule=Host(`hub.example.com`)"
      - "traefik.http.routers.phlix-hub.tls=true"
      - "traefik.http.services.phlix-hub.loadbalancer.server.port=443"
      - "traefik.tcp.routers.phlix-relay.rule=Host(`hub.example.com`)"
      - "traefik.tcp.routers.phlix-relay.entrypoints=relay"
      - "traefik.tcp.services.phlix-relay.loadbalancer.server.port=3473"
    environment:
      - HUB_DATABASE_HOST=mysql-hub
      - HUB_DATABASE_PORT=3306
      - HUB_DATABASE_NAME=phlix_hub
      - HUB_DATABASE_USER=phlix_hub
      - HUB_DATABASE_PASSWORD=${HUB_DB_PASSWORD}
      - HUB_SECRET_KEY=${HUB_SECRET_KEY}
      - HUB_RELAY_ENABLED=true
      - HUB_RELAY_PORT=3473
    volumes:
      - hub_config:/var/phlix-hub/config
      - hub_logs:/var/phlix-hub/logs
    depends_on:
      mysql-hub:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phlix_network

  phlix-server:
    image: ghcr.io/detain/phlix-server:latest
    container_name: phlix-server
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phlix-server.rule=Host(`server.example.com`)"
      - "traefik.http.routers.phlix-server.tls=true"
      - "traefik.http.services.phlix-server.loadbalancer.server.port=80"
    environment:
      - PHLIX_DATABASE_HOST=mysql-server
      - PHLIX_DATABASE_PORT=3306
      - PHLIX_DATABASE_NAME=phlix
      - PHLIX_DATABASE_USER=phlix
      - PHLIX_DATABASE_PASSWORD=${PHLIX_DB_PASSWORD}
      - PHLIX_SECRET_KEY=${PHLIX_SECRET_KEY}
      - PHLIX_HUB_URL=https://hub.example.com
      - PHLIX_LOG_LEVEL=info
    volumes:
      - phlix_config:/var/phlix/config
      - phlix_data:/var/phlix/data
      - phlix_backups:/var/phlix/backups
      - phlix_logs:/var/phlix/logs
      - media_library:/media:ro
    depends_on:
      mysql-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phlix_network

  mysql-hub:
    image: mysql:8.0
    container_name: phlix-hub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: phlix_hub
      MYSQL_USER: phlix_hub
      MYSQL_PASSWORD: ${HUB_DB_PASSWORD}
    volumes:
      - mysql_hub_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - phlix_network

  mysql-server:
    image: mysql:8.0
    container_name: phlix-server-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: phlix
      MYSQL_USER: phlix
      MYSQL_PASSWORD: ${PHLIX_DB_PASSWORD}
    volumes:
      - mysql_server_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - phlix_network

volumes:
  phlix_config:
  phlix_data:
  phlix_backups:
  phlix_logs:
  media_library:
  hub_config:
  hub_logs:
  mysql_hub_data:
  mysql_server_data:
  traefik_certs:

networks:
  phlix_network:
    driver: bridge
