version: '3.8'

services:
  phlix:
    image: ghcr.io/detain/phlix-server:latest
    container_name: phlix-server
    ports:
      - "32400:80"
    environment:
      - PHLIX_DATABASE_HOST=mysql
      - PHLIX_DATABASE_PORT=3306
      - PHLIX_DATABASE_NAME=phlix
      - PHLIX_DATABASE_USER=phlix
      - PHLIX_DATABASE_PASSWORD=${PHLIX_DB_PASSWORD}
      - PHLIX_SECRET_KEY=${PHLIX_SECRET_KEY}
      - PHLIX_LOG_LEVEL=info
    volumes:
      - phlix_config:/var/phlix/config
      - phlix_data:/var/phlix/data
      - phlix_backups:/var/phlix/backups
      - phlix_logs:/var/phlix/logs
      - media_library:/media:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phlix_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: phlix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: phlix
      MYSQL_USER: phlix
      MYSQL_PASSWORD: ${PHLIX_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - phlix_network

volumes:
  phlix_config:
  phlix_data:
  phlix_backups:
  phlix_logs:
  media_library:
  mysql_data:

networks:
  phlix_network:
    driver: bridge
