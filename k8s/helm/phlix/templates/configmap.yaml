apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "phlix.fullname" . }}
  labels:
    {{- include "phlix.labels" . | nindent 4 }}
data:
  # Non-secret runtime configuration mirrored into the container as env vars.
  # config/*.php in the image still reads its own defaults; values here override
  # them for the running pod.
  PHLIX_APP_ENV: "production"
  PHLIX_LOG_LEVEL: {{ .Values.config.log_level | quote }}
  {{- if .Values.config.hub_url }}
  PHLIX_HUB_URL: {{ .Values.config.hub_url | quote }}
  {{- end }}
