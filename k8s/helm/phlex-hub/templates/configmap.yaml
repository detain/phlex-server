apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "phlex-hub.fullname" . }}
  labels:
    {{- include "phlex-hub.labels" . | nindent 4 }}
data:
  PHLEX_HUB_APP_ENV: "production"
  PHLEX_HUB_LOG_LEVEL: {{ .Values.config.log_level | quote }}
  {{- if .Values.config.public_url }}
  PHLEX_HUB_PUBLIC_URL: {{ .Values.config.public_url | quote }}
  {{- end }}
