apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "phlex-hub.fullname" . }}
  labels:
    {{- include "phlex-hub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "phlex-hub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "phlex-hub.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "phlex-hub.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: relay
              containerPort: 9443
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          env:
            - name: PHLEX_HUB_DATABASE_HOST
              value: {{ tpl (.Values.config.database_host | toString) . | quote }}
            - name: PHLEX_HUB_DATABASE_PORT
              value: {{ .Values.config.database_port | quote }}
            - name: PHLEX_HUB_DATABASE_NAME
              value: {{ .Values.config.database_name | quote }}
            - name: PHLEX_HUB_DATABASE_USER
              value: {{ .Values.config.database_user | quote }}
            - name: PHLEX_HUB_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "phlex-hub.fullname" . }}
                  key: database-password
            - name: PHLEX_HUB_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "phlex-hub.fullname" . }}
                  key: secret-key
            - name: PHLEX_HUB_LOG_LEVEL
              value: {{ .Values.config.log_level | quote }}
            - name: PHLEX_HUB_PUBLIC_URL
              value: {{ .Values.config.public_url | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "phlex-hub.fullname" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: logs
              mountPath: /var/phlex-hub/logs
      volumes:
        - name: logs
          {{- if and .Values.persistence.enabled .Values.persistence.logs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "phlex-hub.fullname" . }}-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
