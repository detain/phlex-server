apiVersion: v1
kind: Secret
metadata:
  name: {{ include "phlex.fullname" . }}
  labels:
    {{- include "phlex.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-password: {{ required "config.database_password is required" .Values.config.database_password | quote }}
  secret-key: {{ required "config.secret_key is required" .Values.config.secret_key | quote }}
  {{- if .Values.hub.enabled }}
  hub-enrollment-jwt: {{ required "hub.enrollmentJwt is required when hub.enabled" .Values.hub.enrollmentJwt | quote }}
  {{- end }}
