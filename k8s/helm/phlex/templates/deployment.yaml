apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "phlix.fullname" . }}
  labels:
    {{- include "phlix.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "phlix.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "phlix.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "phlix.serviceAccountName" . }}
      {{- if and .Values.hwAccel.enabled .Values.hwAccel.runtimeClassName }}
      runtimeClassName: {{ .Values.hwAccel.runtimeClassName }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: websocket
              containerPort: 3473
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          env:
            - name: PHLIX_DATABASE_HOST
              value: {{ tpl (.Values.config.database_host | toString) . | quote }}
            - name: PHLIX_DATABASE_PORT
              value: {{ .Values.config.database_port | quote }}
            - name: PHLIX_DATABASE_NAME
              value: {{ .Values.config.database_name | quote }}
            - name: PHLIX_DATABASE_USER
              value: {{ .Values.config.database_user | quote }}
            - name: PHLIX_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "phlix.fullname" . }}
                  key: database-password
            - name: PHLIX_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "phlix.fullname" . }}
                  key: secret-key
            - name: PHLIX_LOG_LEVEL
              value: {{ .Values.config.log_level | quote }}
            - name: PHLIX_HUB_URL
              value: {{ default .Values.config.hub_url .Values.hub.url | quote }}
            {{- if .Values.hub.enabled }}
            - name: PHLIX_HUB_ENROLLMENT_JWT
              valueFrom:
                secretKeyRef:
                  name: {{ include "phlix.fullname" . }}
                  key: hub-enrollment-jwt
            {{- end }}
            {{- with .Values.hwAccel.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "phlix.fullname" . }}
          resources:
            {{- if .Values.hwAccel.enabled }}
            {{- $base := .Values.resources -}}
            {{- $hw := .Values.hwAccel.resources -}}
            {{- toYaml (merge (deepCopy $hw) $base) | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /var/phlix/config
            - name: data
              mountPath: /var/phlix/data
            - name: backups
              mountPath: /var/phlix/backups
            - name: logs
              mountPath: /var/phlix/logs
            {{- if .Values.persistence.recordings.enabled }}
            - name: recordings
              mountPath: /var/phlix/recordings
            {{- end }}
            {{- if .Values.persistence.media.enabled }}
            - name: media
              mountPath: {{ .Values.persistence.media.mountPath }}
              readOnly: {{ .Values.persistence.media.readOnly }}
            {{- end }}
            {{- if and .Values.hwAccel.enabled .Values.hwAccel.mountDri }}
            - name: dri
              mountPath: /dev/dri
            {{- end }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "phlix.fullname" . }}-config
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "phlix.fullname" . }}-data
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "phlix.fullname" . }}-backups
        - name: logs
          {{- if .Values.persistence.logs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "phlix.fullname" . }}-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.persistence.recordings.enabled }}
        - name: recordings
          persistentVolumeClaim:
            claimName: {{ include "phlix.fullname" . }}-recordings
        {{- end }}
        {{- if .Values.persistence.media.enabled }}
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "phlix.fullname" . }}-media
        {{- end }}
        {{- if and .Values.hwAccel.enabled .Values.hwAccel.mountDri }}
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
