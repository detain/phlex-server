apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "phlex.fullname" . }}
  labels:
    {{- include "phlex.labels" . | nindent 4 }}
data:
  # Non-secret runtime configuration mirrored into the container as env vars.
  # config/*.php in the image still reads its own defaults; values here override
  # them for the running pod.
  PHLEX_APP_ENV: "production"
  PHLEX_LOG_LEVEL: {{ .Values.config.log_level | quote }}
  {{- if .Values.config.hub_url }}
  PHLEX_HUB_URL: {{ .Values.config.hub_url | quote }}
  {{- end }}
