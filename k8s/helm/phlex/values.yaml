replicaCount: 1

image:
  repository: ghcr.io/detain/phlex-server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  http:
    port: 80
  websocket:
    port: 3473

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
  hosts:
    - host: phlex.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: phlex-tls
      hosts:
        - phlex.local

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  config:
    storageClass: ""
    size: 1Gi
  data:
    storageClass: ""
    size: 10Gi
  backups:
    storageClass: ""
    size: 5Gi
  media:
    enabled: true
    storageClass: ""
    size: 100Gi
    mountPath: /media
    readOnly: true

mysql:
  enabled: true
  auth:
    database: phlex
    username: phlex
  primary:
    persistence:
      size: 10Gi

config:
  database_host: "{{ .Release.Name }}-mysql"
  database_port: 3306
  database_name: phlex
  database_user: phlex
  database_password: ""
  secret_key: ""
  log_level: info
  hub_url: ""
  hub_pairing_code: ""

nodeSelector: {}

tolerations: []

affinity: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 30
